# コマンド実行規約定義
# 危険なコマンドや確認が必要なコマンドに対して適用される規約を定義します
# ClaudeCodeがこれらのコマンドを実行する際に、規約確認を促します

rules:
  - name: "Git push/commit前確認"
    patterns:
      - "git push*"
      - "git commit*"
    severity: "warn"
    token_threshold: 25000
    message: |
      Gitにpush/commitする前に以下を確認してください:
      - 変更内容のレビュー完了
      - テスト実行済み
      - コミットメッセージにissue_idを含めているか

  - name: "Git差分確認推奨"
    patterns:
      - "git diff*"
    severity: "info"
    token_threshold: 25000
    message: |
      git diffで変更内容を確認する際のヒント:
      - `git diff --staged`でステージ済み変更を確認
      - 意図しない変更が含まれていないか確認

  - name: "Gitコミット規約"
    patterns:
      - "git commit*"
    severity: "warn"
    token_threshold: 25000
    message: |
      コミット規約を遵守してください:
      - コミットメッセージにissue_{id}を含める
      - 1コミット1目的（関連しない変更を混ぜない）

  - name: "mainブランチpush前最終確認"
    patterns:
      - "git push origin main"
      - "git push origin master"
    severity: "warn"
    token_threshold: 25000
    message: |
      mainブランチへの直接pushは影響が大きいです:
      - CIテストが全て通っているか確認
      - レビュー済みか確認
      - 本当にmainブランチへ直接pushすべきか再検討

  - name: "Git操作前テスト実行推奨"
    patterns:
      - "git add*"
      - "git commit*"
    severity: "info"
    token_threshold: 25000
    message: |
      コミット前にテストを実行することを推奨します:
      - `python3 -m pytest tests/ -v`
      - テスト失敗がないことを確認してからコミット

  - name: "リリーススクリプト実行確認"
    patterns:
      - "./scripts/release.sh*"
    severity: "warn"
    token_threshold: 25000
    message: |
      リリーススクリプト実行前に確認してください:
      - バージョン番号の指定は正しいか
      - CHANGELOG.mdが更新されているか
      - .envにGH_TOKENが設定されているか
      - オプション: `--release-only`でGitHubリリースのみ実行可能

  - name: "Docker操作規約"
    patterns:
      - "docker*"
      - "docker-compose*"
    severity: "warn"
    token_threshold: 40000
    message: |
      微調整レベルの変更のみ許可されています

  # --- role別制約 (#7058) ---

  # 制約#2: leader Bash非gitコマンドdeny
  # fnmatch否定パターン: git以外の全コマンドをマッチ
  # [!g]* = 先頭g以外, g[!i]* = gi以外, gi[!t]* = git以外, git[! ]* = git+スペース以外
  - name: "leader非gitコマンド禁止"
    patterns:
      - "[!g]*"
      - "g[!i]*"
      - "gi[!t]*"
      - "git[! ]*"
    severity: "deny"
    scope: "leader"
    message: |
      leaderはgitコマンド以外のBash実行が禁止されています。
      コマンド実行はsubagentに委譲してください

  # 制約#4: tech-lead/researcher 破壊的コマンドdeny（scopeは単一値のみ→2ルール定義）
  - name: "tech-lead破壊的コマンド禁止"
    patterns:
      - "rm -rf*"
      - "git push --force*"
      - "git push -f*"
      - "git reset --hard*"
      - "git clean -f*"
    severity: "deny"
    scope: "tech-lead"
    message: |
      tech-leadは破壊的コマンドが禁止されています

  - name: "researcher破壊的コマンド禁止"
    patterns:
      - "rm -rf*"
      - "git push --force*"
      - "git push -f*"
      - "git reset --hard*"
      - "git clean -f*"
    severity: "deny"
    scope: "researcher"
    message: |
      researcherは破壊的コマンドが禁止されています

  # --- role別制約 (#7145) ---

  # 制約#14: pmo非gitコマンド禁止
  - name: "pmo非gitコマンド禁止"
    patterns:
      - "[!g]*"
      - "g[!i]*"
      - "gi[!t]*"
      - "git[! ]*"
    severity: "deny"
    scope: "pmo"
    message: |
      pmoはgitコマンド以外のBash実行が禁止されています

  # 制約#15: tech-lead非gitコマンド禁止
  - name: "tech-lead非gitコマンド禁止"
    patterns:
      - "[!g]*"
      - "g[!i]*"
      - "gi[!t]*"
      - "git[! ]*"
    severity: "deny"
    scope: "tech-lead"
    message: |
      tech-leadはgitコマンド以外のBash実行が禁止されています

  # --- role別制約 (#7169) ---

  # 制約#17: coder git commit/push禁止
  - name: "coderGitCommit禁止"
    patterns:
      - "git commit*"
      - "git push*"
    severity: "deny"
    scope: "coder"
    message: |
      coderはgit commit/pushが禁止されています。
      レビュー承認後、tech-leadがコミットします
